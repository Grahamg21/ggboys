<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2a0050"/>
      <stop offset="100%" stop-color="#0E0020"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFD700"/>
      <stop offset="50%" stop-color="#B87333"/>
      <stop offset="100%" stop-color="#FFD700"/>
    </linearGradient>
    <!-- Subtle tie-dye glow blobs -->
    <radialGradient id="glow1" cx="25%" cy="30%">
      <stop offset="0%" stop-color="#a855f7" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="75%" cy="70%">
      <stop offset="0%" stop-color="#FF6B1A" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#FF6B1A" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="64" height="64" rx="10" fill="url(#bg)"/>

  <!-- Tie-dye glow blobs -->
  <rect width="64" height="64" rx="10" fill="url(#glow1)"/>
  <rect width="64" height="64" rx="10" fill="url(#glow2)"/>

  <!-- Border -->
  <rect width="64" height="64" rx="10" fill="none" stroke="#B87333" stroke-width="1.5" stroke-opacity="0.5"/>

  <!-- GG letters -->
  <text
    x="32" y="45"
    text-anchor="middle"
    font-family="Georgia, 'Times New Roman', serif"
    font-weight="bold"
    font-size="34"
    letter-spacing="-1"
    fill="url(#gold)"
  >GG</text>
</svg>
